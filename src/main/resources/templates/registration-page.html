<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — BankSystem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2"/>
                <path d="M16 7V5a2 2 0 0 0-4 0v2"/>
                <line x1="12" y1="12" x2="12" y2="16"/>
                <circle cx="12" cy="12" r="1" fill="currentColor"/>
            </svg>
            <span>BankSystem</span>
        </div>

        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Join BankSystem and manage your finances</p>

        <div th:if="${param.error}" class="alert alert-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            An account with this email already exists.
        </div>

        <form th:action="@{/api/auth/register}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="firstName">First name</label>
                    <input class="form-input" type="text" id="firstName" name="firstName"
                           placeholder="John" required autofocus/>
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastName">Last name</label>
                    <input class="form-input" type="text" id="lastName" name="lastName"
                           placeholder="Doe" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input class="form-input" type="email" id="email" name="email"
                       placeholder="you@example.com" required/>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password"
                       placeholder="••••••••" minlength="6" required/>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top:8px">
                Create account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/api/auth/login}">Sign in</a>
        </div>

        <div class="auth-divider">
            <span>or continue with</span>
        </div>

        <a href="/oauth2/authorization/google" class="btn btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
            Sign up with Google
        </a>
    </div>
</div>
</body>
</html>
